<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlightClub · Einstellungen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d0d0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <script src="config.js"></script>
    <script src="ui-utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>document.documentElement.setAttribute("data-theme",localStorage.getItem("fc47_theme")||"dark");</script>
</head>
<body>

    <nav id="nav-settings">
        <div class="nav-inner nav-inner--default">
            <a href="index.html" class="nav-brand" style="text-decoration:none;color:inherit;">FLIGHTCLUB</a>
            <div class="nav-links">
                <a href="index.html" class="nav-btn">« Menü</a>
            </div>
        </div>
    </nav>

    <div class="app-wrapper">

        <!-- PROFILE HEADER -->
        <div class="settings-header">
            <div class="settings-avatar" id="settings-avatar"></div>
            <div class="settings-user-info">
                <div class="settings-username" id="settings-username"></div>
                <div class="settings-role-badge" id="settings-role-badge"></div>
            </div>
        </div>

        <!-- CHANGE PASSWORD -->
        <div class="card">
            <h2 class="card-title">EINSTELLUNGEN</h2>
            <div class="divider"></div>

            <!-- THEME -->
            <h3 class="section-label">Design</h3>
            <div class="theme-toggle-wrap">
                <button id="theme-btn-dark" class="theme-btn" onclick="selectTheme('dark')">
                    <div class="theme-btn-preview theme-btn-preview--dark"></div>
                    <span class="theme-btn-icon">🌑</span>
                    DARK
                </button>
                <button id="theme-btn-light" class="theme-btn" onclick="selectTheme('light')">
                    <div class="theme-btn-preview theme-btn-preview--light"></div>
                    <span class="theme-btn-icon">☀️</span>
                    LIGHT
                </button>
            </div>

            <div class="divider" style="margin-top:20px;"></div>

            <h3 class="section-label" style="margin-top:16px;">Passwort ändern</h3>
            <div class="settings-form">
                <div class="settings-field">
                    <label class="settings-label">Aktuelles Passwort</label>
                    <input type="password" id="current-password" placeholder="Aktuelles Passwort" class="input-field" autocomplete="current-password">
                </div>
                <div class="settings-field">
                    <label class="settings-label">Neues Passwort</label>
                    <input type="password" id="new-password" placeholder="Neues Passwort" class="input-field" autocomplete="new-password">
                </div>
                <div class="settings-field">
                    <label class="settings-label">Passwort bestätigen</label>
                    <input type="password" id="confirm-password" placeholder="Passwort wiederholen" class="input-field" autocomplete="new-password">
                </div>
                <button onclick="changePassword()" class="btn btn-primary btn-full">PASSWORT ÄNDERN</button>
            </div>
            <p id="settings-msg" class="settings-msg"></p>
        </div>

        <!-- PUSH NOTIFICATIONS -->
        <div class="card">
            <h2 class="card-title">BENACHRICHTIGUNGEN</h2>
            <div class="divider"></div>
            <p class="muted-text" style="margin-bottom:16px; font-size:0.85rem;">
                Erhalte eine Push-Benachrichtigung 24 Stunden vor einem Termin.<br>
                Die App muss als PWA installiert sein.
            </p>
            <div style="display:flex; align-items:center; justify-content:space-between; gap:12px;">
                <span id="push-status-text" style="font-size:0.9rem; color:var(--text-secondary);">Lade Status…</span>
                <button id="push-toggle-btn" class="btn btn-primary" onclick="togglePush()" style="min-width:140px; display:none;">–</button>
            </div>
            <p id="push-msg" class="settings-msg" style="margin-top:10px;"></p>
        </div>

    </div>

    <script>
        const SUPABASE_URL = window.SUPABASE_URL;
        const SUPABASE_KEY = window.SUPABASE_KEY;
        const supa = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const SESSION_KEY = 'fc47_user';

        // ── THEME TOGGLE ──
        function selectTheme(theme) {
            setTheme(theme);
            document.getElementById('theme-btn-dark').classList.toggle('theme-btn--active',  theme === 'dark');
            document.getElementById('theme-btn-light').classList.toggle('theme-btn--active', theme === 'light');
        }

        // Set initial active state
        selectTheme(getTheme());

        // ── AUTH GUARD ──
        const raw = sessionStorage.getItem(SESSION_KEY);
        const currentUser = raw ? JSON.parse(raw) : null;
        if (!currentUser) window.location.href = 'index.html';

        // ── POPULATE HEADER ──
        const initials = currentUser.username.slice(0, 2).toUpperCase();
        document.getElementById('settings-avatar').textContent   = initials;
        document.getElementById('settings-username').textContent = currentUser.username.toUpperCase();

        const roleBadge = document.getElementById('settings-role-badge');
        roleBadge.textContent = currentUser.role.toUpperCase();
        roleBadge.classList.add('role-badge', `role-badge--${currentUser.role}`);

        // ── CHANGE PASSWORD ──
        async function changePassword() {
            const currentPw  = document.getElementById('current-password').value;
            const newPw      = document.getElementById('new-password').value;
            const confirmPw  = document.getElementById('confirm-password').value;
            const msgEl      = document.getElementById('settings-msg');

            const showMsg = (text, color) => {
                msgEl.textContent  = text;
                msgEl.style.color  = color;
                setTimeout(() => msgEl.textContent = '', 4000);
            };

            if (!currentPw || !newPw || !confirmPw) {
                return showMsg('Bitte alle Felder ausfüllen.', 'var(--red)');
            }
            if (newPw.length < 4) {
                return showMsg('Neues Passwort muss mindestens 4 Zeichen haben.', 'var(--red)');
            }
            if (newPw !== confirmPw) {
                return showMsg('Neue Passwörter stimmen nicht überein.', 'var(--red)');
            }

            // 1. Verify current password
            const { data: user, error: verifyError } = await supa
                .from('app_users')
                .select('id')
                .eq('id', currentUser.id)
                .eq('password', currentPw)
                .single();

            if (verifyError || !user) {
                return showMsg('Aktuelles Passwort ist falsch.', 'var(--red)');
            }

            // 2. Update to new password
            const { error: updateError } = await supa
                .from('app_users')
                .update({ password: newPw })
                .eq('id', currentUser.id);

            if (updateError) {
                return showMsg('Fehler: ' + updateError.message, 'var(--red)');
            }

            // 3. Clear fields
            document.getElementById('current-password').value = '';
            document.getElementById('new-password').value     = '';
            document.getElementById('confirm-password').value = '';

            showMsg('Passwort erfolgreich geändert!', 'var(--green)');
        }

        // ── PUSH NOTIFICATIONS ──
        const VAPID_PUBLIC_KEY = 'BGQh6RgTsZmguX6S1nRxpzz0-2Now2mIQAdjgfkkhvge7lSQXaHam55cFNSQTZotupFCqAybeosZZ4k-Ly7za0w';

        function urlBase64ToUint8Array(b64) {
            const pad = '='.repeat((4 - b64.length % 4) % 4);
            const raw = atob((b64 + pad).replace(/-/g, '+').replace(/_/g, '/'));
            return new Uint8Array([...raw].map(c => c.charCodeAt(0)));
        }

        async function checkPushStatus() {
            const statusEl = document.getElementById('push-status-text');
            const btnEl    = document.getElementById('push-toggle-btn');

            if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
                statusEl.textContent  = 'Push-Benachrichtigungen werden auf diesem Gerät nicht unterstützt.';
                btnEl.style.display   = 'none';
                return;
            }
            if (Notification.permission === 'denied') {
                statusEl.textContent  = 'Benachrichtigungen sind im Browser blockiert. Bitte in den Einstellungen freigeben.';
                btnEl.style.display   = 'none';
                return;
            }

            const { data: existing } = await supa
                .from('push_subscriptions')
                .select('id')
                .eq('user_id', currentUser.id)
                .maybeSingle();

            btnEl.style.display = 'inline-block';
            if (existing) {
                statusEl.textContent = '🔔 Benachrichtigungen aktiviert';
                btnEl.textContent    = 'DEAKTIVIEREN';
                btnEl.className      = 'btn';
            } else {
                statusEl.textContent = '🔕 Benachrichtigungen deaktiviert';
                btnEl.textContent    = 'AKTIVIEREN';
                btnEl.className      = 'btn btn-primary';
            }
        }

        async function togglePush() {
            const { data: existing } = await supa
                .from('push_subscriptions')
                .select('id')
                .eq('user_id', currentUser.id)
                .maybeSingle();

            if (existing) {
                // Unsubscribe
                const reg = await navigator.serviceWorker.ready;
                const sub = await reg.pushManager.getSubscription();
                if (sub) await sub.unsubscribe();
                await supa.from('push_subscriptions').delete().eq('user_id', currentUser.id);
                showToast('Benachrichtigungen deaktiviert.', 'info');
            } else {
                // Subscribe
                try {
                    const reg = await navigator.serviceWorker.ready;
                    const sub = await reg.pushManager.subscribe({
                        userVisibleOnly:      true,
                        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
                    });
                    const json   = sub.toJSON();
                    const { error } = await supa.from('push_subscriptions').upsert([{
                        user_id:  currentUser.id,
                        endpoint: json.endpoint,
                        p256dh:   json.keys.p256dh,
                        auth:     json.keys.auth
                    }], { onConflict: 'endpoint' });
                    if (error) throw new Error(error.message);
                    showToast('Benachrichtigungen aktiviert!', 'success');
                } catch(e) {
                    showToast('Fehler: ' + e.message, 'error');
                    return;
                }
            }
            checkPushStatus();
        }

        checkPushStatus();
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/fightclub-dart-tracker/sw.js')
                .catch(() => {});
        }
    </script>
</body>
</html>
