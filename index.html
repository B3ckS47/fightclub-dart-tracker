<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlightClub · DC 47</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d0d0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <!-- ── SPLASH / LOGIN SCREEN ── -->
    <div id="splash-screen">
        <div id="splash-content">
            <img src="Logo.png" alt="DC Flight Club 47" id="splash-logo">
            <p class="splash-subtitle">MEMBERS ONLY</p>

            <div class="splash-form">
                <input
                    type="text"
                    id="splash-username"
                    placeholder="Username"
                    class="splash-input"
                    onkeydown="if(event.key==='Enter') checkLogin()"
                    autocomplete="off"
                    autocapitalize="none"
                >
                <input
                    type="password"
                    id="splash-password"
                    placeholder="Password"
                    class="splash-input"
                    onkeydown="if(event.key==='Enter') checkLogin()"
                    autocomplete="off"
                >
                <button onclick="checkLogin()" class="splash-btn" id="splash-btn">EINLOGGEN</button>
            </div>
            <p id="splash-error" class="splash-error"></p>

            <!-- PWA install button — shown only when install prompt is available -->
            <button id="pwa-install-btn" class="pwa-install-btn" style="display:none;" onclick="installPWA()">
                ↓ App installieren
            </button>
        </div>
    </div>

    <!-- ── MENU PAGE ── -->
    <div id="menu-page" style="display:none;">

        <nav class="menu-nav">
            <div class="nav-inner nav-inner--default">
                <span class="nav-brand">FLIGHTCLUB</span>
                <div class="nav-links">
                    <a href="settings.html" id="menu-user-display" class="menu-user-badge menu-user-badge--link"></a>
                    <button onclick="logOut()" class="nav-btn">Logout</button>
                </div>
            </div>
        </nav>

        <div class="menu-wrapper">
            <!-- Next Appointment Teaser -->
            <a href="schedule.html" id="next-appt-card" class="next-appt-card" style="display:none;">
                <div class="next-appt-row">
                    <div class="next-appt-left">
                        <span id="next-appt-type" class="appt-type-badge"></span>
                        <div id="next-appt-title" class="next-appt-title"></div>
                    </div>
                    <div class="next-appt-center">
                        <div id="next-appt-date" class="next-appt-date"></div>
                        <div id="next-appt-time" class="next-appt-time"></div>
                    </div>
                    <div class="next-appt-right">
                        <div class="next-appt-votes">
                            <span>✅ <strong id="next-appt-yes">0</strong></span>
                            <span>❌ <strong id="next-appt-no">0</strong></span>
                        </div>
                        <div class="next-appt-arrow">»</div>
                    </div>
                </div>
            </a>

            <div class="menu-logo-wrap">
                <img src="Logo.png" alt="DC Flight Club 47" class="menu-logo">
                <div class="menu-welcome">DC FLIGHT CLUB 47</div>
            </div>

            <div class="menu-cards" id="menu-cards">
                <a href="game.html" class="menu-card menu-card--game">
                    <div class="menu-card-icon">🎯</div>
                    <div class="menu-card-body">
                        <div class="menu-card-title">NEUES SPIEL</div>
                        <div class="menu-card-sub">501 · 301 · Einzel · Doppel</div>
                    </div>
                    <div class="menu-card-arrow">»</div>
                </a>

                <a href="dashboard.html" class="menu-card menu-card--dashboard" id="dashboard-card">
                    <div class="menu-card-icon">📊</div>
                    <div class="menu-card-body">
                        <div class="menu-card-title">DASHBOARD</div>
                        <div class="menu-card-sub">Statistiken · Leaderboard · Profile</div>
                    </div>
                    <div class="menu-card-arrow">»</div>
                </a>

                <!-- Admin card — injected by JS if role === admin -->
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = window.SUPABASE_URL;
        const SUPABASE_KEY = window.SUPABASE_KEY;
        const supa = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const SESSION_KEY = "fc47_user";

        // ── LOGIN ──
        async function checkLogin() {
            const username = document.getElementById('splash-username').value.trim();
            const password = document.getElementById('splash-password').value;
            const errEl    = document.getElementById('splash-error');
            const btn      = document.getElementById('splash-btn');

            if (!username || !password) {
                errEl.textContent = "Bitte Username und Passwort eingeben.";
                return;
            }

            btn.textContent = '...';
            btn.disabled = true;

            const { data, error } = await supa
                .from('app_users')
                .select('*')
                .eq('username', username)
                .eq('password', password)
                .single();

            btn.textContent = 'EINLOGGEN';
            btn.disabled = false;

            if (error || !data) {
                errEl.textContent = "Falscher Username oder Passwort.";
                document.getElementById('splash-password').value = '';
                document.getElementById('splash-username').classList.add('splash-input--error');
                document.getElementById('splash-password').classList.add('splash-input--error');
                setTimeout(() => {
                    document.getElementById('splash-username').classList.remove('splash-input--error');
                    document.getElementById('splash-password').classList.remove('splash-input--error');
                    errEl.textContent = '';
                }, 1800);
                return;
            }

            // Store user in sessionStorage
            sessionStorage.setItem(SESSION_KEY, JSON.stringify({
                id:        data.id,
                username:  data.username,
                role:      data.role,
                player_id: data.player_id
            }));

            unlockApp(data);
        }

        function unlockApp(user) {
            const splash = document.getElementById('splash-screen');
            splash.classList.add('splash-fade-out');
            setTimeout(() => {
                splash.style.display = 'none';
                showMenu(user);
            }, 600);
        }

        function showMenu(user) {
            document.getElementById('menu-page').style.display = 'block';
            document.getElementById('menu-user-display').textContent = user.username.toUpperCase();

            // ipad role: only show "Neues Spiel" + Turniere
            if (user.role === 'ipad') {
                document.getElementById('dashboard-card').style.display = 'none';
                const t = document.createElement('a');
                t.href = 'tournaments.html';
                t.className = 'menu-card menu-card--tournament';
                t.innerHTML = `<div class="menu-card-icon">🏆</div><div class="menu-card-body"><div class="menu-card-title">TURNIERE</div><div class="menu-card-sub">K.O. · Swiss · Einzel · Doppel</div></div><div class="menu-card-arrow">»</div>`;
                document.getElementById('menu-cards').appendChild(t);
                return;
            }

            // Load next appointment teaser for member + admin
            loadNextAppointment();

            // tournaments card — all roles
            const tournCard = document.createElement('a');
            tournCard.href      = 'tournaments.html';
            tournCard.className = 'menu-card menu-card--tournament';
            tournCard.innerHTML = `
                <div class="menu-card-icon">🏆</div>
                <div class="menu-card-body">
                    <div class="menu-card-title">TURNIERE</div>
                    <div class="menu-card-sub">K.O. · Swiss · Einzel · Doppel</div>
                </div>
                <div class="menu-card-arrow">»</div>
            `;
            document.getElementById('menu-cards').appendChild(tournCard);

            // Check for live game — injects card if one is active
            loadLiveGame();

            // fines card — member + admin
            const cards     = document.getElementById('menu-cards');
            const finesCard = document.createElement('a');
            finesCard.id        = 'fines-menu-card';
            finesCard.href      = 'fines.html';
            finesCard.className = 'menu-card menu-card--fines';
            finesCard.innerHTML = `
                <div class="menu-card-icon">💸</div>
                <div class="menu-card-body">
                    <div class="menu-card-title">STRAFEN</div>
                    <div class="menu-card-sub" id="fines-card-sub">Übersicht · Verlauf · Saldo</div>
                </div>
                <div class="menu-card-arrow">»</div>
            `;
            cards.appendChild(finesCard);

            // Load personal fines balance into subtitle
            if (user.player_id) {
                supa.from('fines_ledger')
                    .select('amount')
                    .eq('player_id', user.player_id)
                    .then(({ data }) => {
                        const balance = (data || []).reduce((s, r) => s + parseFloat(r.amount), 0);
                        const sub     = document.getElementById('fines-card-sub');
                        if (!sub) return;
                        const fmt = balance.toLocaleString('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €';
                        sub.innerHTML = `Übersicht · Verlauf · <span style="color:${balance > 0 ? 'var(--red)' : 'var(--green)'}; font-weight:700;">${fmt}</span>`;
                    });
            }

            // admin: add admin card + Spieltagsplanung
            if (user.role === 'admin') {
                const cards = document.getElementById('menu-cards');

                const spieltagCard = document.createElement('a');
                spieltagCard.href = 'spieltag.html';
                spieltagCard.className = 'menu-card menu-card--spieltag';
                spieltagCard.innerHTML = `
                    <div class="menu-card-icon">📋</div>
                    <div class="menu-card-body">
                        <div class="menu-card-title">SPIELTAGSPLANUNG</div>
                        <div class="menu-card-sub">Aufstellung · Brackets · Spieltage</div>
                    </div>
                    <div class="menu-card-arrow">»</div>
                `;
                cards.appendChild(spieltagCard);

                const adminCard = document.createElement('a');
                adminCard.href = 'admin.html';
                adminCard.className = 'menu-card menu-card--admin';
                adminCard.innerHTML = `
                    <div class="menu-card-icon">⚙️</div>
                    <div class="menu-card-body">
                        <div class="menu-card-title">ADMIN</div>
                        <div class="menu-card-sub">Benutzer · Rollen · Verwaltung</div>
                    </div>
                    <div class="menu-card-arrow">»</div>
                `;
                cards.appendChild(adminCard);
            }
        }

        async function loadNextAppointment() {
            const TYPE_COLORS = {
                Training:   { bg: 'rgba(59,130,246,0.15)',  color: '#60a5fa', label: 'TRAINING'  },
                Tournament: { bg: 'rgba(245,166,35,0.15)',  color: '#f5a623', label: 'TURNIER'   },
                Event:      { bg: 'rgba(168,85,247,0.15)',  color: '#a855f7', label: 'EVENT'     },
                Gameday:    { bg: 'rgba(255,68,85,0.15)',   color: '#ff4455', label: 'SPIELTAG'  }
            };

            const { data: appointments } = await supa
                .from('appointments')
                .select('*')
                .gte('date', new Date().toISOString())
                .order('date', { ascending: true })
                .limit(1);

            if (!appointments || appointments.length === 0) return;
            const appt = appointments[0];

            const { data: votes } = await supa
                .from('appointment_votes')
                .select('*')
                .eq('appointment_id', appt.id);

            const allVotes = votes || [];
            const yes = allVotes.filter(v => v.vote === 'yes').length;
            const no  = allVotes.filter(v => v.vote === 'no').length;

            // Check if current user has voted
            const currentUser  = getCurrentUser();
            const myVote       = currentUser
                ? allVotes.find(v => v.user_id === currentUser.id)
                : true; // ipad / unknown — don't show warning

            const typeStyle = TYPE_COLORS[appt.type] || TYPE_COLORS.Event;
            const dateObj   = new Date(appt.date);
            const dateStr   = dateObj.toLocaleDateString('de-DE', { weekday: 'short', day: '2-digit', month: '2-digit', year: 'numeric' });
            const timeStr   = dateObj.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });

            document.getElementById('next-appt-type').textContent        = typeStyle.label;
            document.getElementById('next-appt-type').style.background   = typeStyle.bg;
            document.getElementById('next-appt-type').style.color        = typeStyle.color;
            document.getElementById('next-appt-title').textContent       = appt.title;
            document.getElementById('next-appt-date').textContent        = dateStr;
            document.getElementById('next-appt-time').textContent        = timeStr + ' Uhr';
            document.getElementById('next-appt-yes').textContent         = yes;
            document.getElementById('next-appt-no').textContent          = no;

            const card = document.getElementById('next-appt-card');
            card.style.display = 'flex';

            // Vote reminder — highlight card and add full-width bottom bar
            if (!myVote) {
                card.classList.add('next-appt-card--unvoted');
                const badge = document.createElement('div');
                badge.className   = 'next-appt-vote-badge';
                badge.innerHTML   = '⚠️ Noch nicht abgestimmt!';
                card.appendChild(badge);
            }
        }

        async function loadLiveGame() {
            const { data } = await supa
                .from('live_game')
                .select('id, state')
                .eq('role', 'ipad')
                .not('state', 'is', null);

            const activeGames = (data || []).filter(r => r.state);

            // Remove any previously injected live cards
            document.querySelectorAll('.live-game-card').forEach(c => c.remove());

            if (activeGames.length === 0) return;

            const wrapper   = document.querySelector('.menu-wrapper');
            const schedCard = document.getElementById('next-appt-card');

            activeGames.forEach(row => {
                const s    = row.state;
                const dots = (idx) => Array.from({ length: s.targetLegs }, (_, j) =>
                    `<span style="color:${j < s.legScore[idx] ? 'var(--green)' : 'var(--border-light)'}">${j < s.legScore[idx] ? '●' : '○'}</span>`
                ).join(' ');

                const card    = document.createElement('a');
                card.href      = `spectator.html?id=${encodeURIComponent(row.id)}`;
                card.className = 'next-appt-card live-game-card';
                card.innerHTML = `
                    <div class="next-appt-row">
                        <div class="live-teaser-left">
                            <span class="live-teaser-badge">● LIVE</span>
                            <div class="live-teaser-names">${s.pNames[0]} <span class="live-teaser-vs">vs</span> ${s.pNames[1]}</div>
                        </div>
                        <div class="live-teaser-scores">
                            <div class="live-teaser-row">
                                <span class="live-teaser-score ${s.currentIdx === 0 ? 'live-teaser-score--active' : ''}">${s.scores[0]}</span>
                                <span class="live-teaser-legs">${dots(0)}</span>
                                ${s.liveAvgs && s.liveAvgs[0] !== null ? `<span class="live-teaser-avg">Ø ${s.liveAvgs[0].toFixed(2)}</span>` : ''}
                            </div>
                            <div class="live-teaser-row">
                                <span class="live-teaser-score ${s.currentIdx === 1 ? 'live-teaser-score--active' : ''}">${s.scores[1]}</span>
                                <span class="live-teaser-legs">${dots(1)}</span>
                                ${s.liveAvgs && s.liveAvgs[1] !== null ? `<span class="live-teaser-avg">Ø ${s.liveAvgs[1].toFixed(2)}</span>` : ''}
                            </div>
                        </div>
                        <div class="next-appt-arrow">»</div>
                    </div>
                `;
                wrapper.insertBefore(card, schedCard);
            });
        }

        function logOut() {
            sessionStorage.removeItem(SESSION_KEY);
            window.location.reload();
        }

        // ── AUTH HELPER (used by other pages) ──
        function getCurrentUser() {
            const raw = sessionStorage.getItem(SESSION_KEY);
            return raw ? JSON.parse(raw) : null;
        }

        // Auto-login if session exists
        const existingUser = getCurrentUser();
        if (existingUser) {
            document.getElementById('splash-screen').style.display = 'none';
            showMenu(existingUser);
        }
    </script>
    <script>
        // ── PWA INSTALL PROMPT ──
        let deferredPrompt = null;

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('pwa-install-btn').style.display = 'inline-flex';
        });

        async function installPWA() {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            deferredPrompt = null;
            if (outcome === 'accepted') {
                document.getElementById('pwa-install-btn').style.display = 'none';
            }
        }

        // Hide install button if already running as PWA
        if (window.matchMedia('(display-mode: standalone)').matches) {
            document.getElementById('pwa-install-btn').style.display = 'none';
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/fightclub-dart-tracker/sw.js');
        }
    </script>
</body>
</html>
