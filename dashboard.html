<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlightClub · Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d0d0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <!-- ── NAV ── -->
    <nav id="nav-dashboard">
        <div class="nav-inner nav-inner--default">
            <span class="nav-brand">FLIGHTCLUB</span>
            <div class="nav-links">
                <a href="index.html" class="nav-btn">« Menü</a>
            </div>
        </div>
    </nav>

    <div class="app-wrapper">

        <!-- LEADERBOARD PAGE -->
        <div id="stats-page" class="page active">
            <div class="card">
                <div class="register-section">
                    <h3 class="section-label">Neuen Spieler hinzufügen</h3>
                    <div class="register-row">
                        <input type="text" id="reg-name" placeholder="Nickname eingeben" class="input-field">
                        <button onclick="registerPlayer()" class="btn btn-accent">HINZUFÜGEN</button>
                    </div>
                </div>
                <div class="divider"></div>
                <div>
                    <h3 class="section-label">FlightClub Mitglieder</h3>
                    <div id="player-list-box" class="player-list">
                        <p class="muted-text">Lade Mitglieder...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- PLAYER PROFILE PAGE -->
        <div id="player-profile-view" class="page">
            <div class="card">
                <div class="profile-header">
                    <button onclick="showPage('stats-page')" class="btn btn-ghost">« Zurück</button>
                    <h2 id="profile-name" class="profile-name-title">Player Name</h2>
                    <div style="width:80px;"></div>
                </div>
                <div id="profile-stats-summary" class="stats-grid"></div>

                <!-- Advanced Analytics (foldable) -->
                <div class="fold-section">
                    <div class="fold-header" onclick="toggleFold('fold-advanced')">
                        <h3 class="subsection-title subsection-title--fold">Advanced Analytics</h3>
                        <span class="fold-icon" id="fold-advanced-icon">▶</span>
                    </div>
                    <div id="fold-advanced" class="fold-body" style="display:none;">
                        <div id="profile-advanced-stats" class="advanced-grid"></div>
                    </div>
                </div>

                <!-- Performance Chart (foldable) -->
                <div class="fold-section" id="profile-chart-section" style="display:none;">
                    <div class="fold-header" onclick="toggleFold('fold-chart')">
                        <h3 class="subsection-title subsection-title--fold">Performance · Last 5 Games</h3>
                        <span class="fold-icon" id="fold-chart-icon">▶</span>
                    </div>
                    <div id="fold-chart" class="fold-body" style="display:none;">
                        <div id="profile-chart" class="profile-chart-box"></div>
                    </div>
                </div>

                <!-- Match History (foldable) -->
                <div class="fold-section">
                    <div class="fold-header" onclick="toggleFold('fold-history')">
                        <h3 class="subsection-title subsection-title--fold">Recent Match History</h3>
                        <span class="fold-icon" id="fold-history-icon">▶</span>
                    </div>
                    <div id="fold-history" class="fold-body" style="display:none;">
                        <div id="profile-history-list"></div>
                    </div>
                </div>
            </div>

            <!-- ATTENDANCE CARD -->
            <div class="card" id="profile-attendance-card" style="display:none;">
                <div class="fold-section" style="border-top:none;">
                    <div class="fold-header" onclick="toggleFold('fold-attendance')">
                        <h2 class="card-title" style="margin:0;">ANWESENHEIT</h2>
                        <span class="fold-icon" id="fold-attendance-icon">▶</span>
                    </div>
                    <div id="fold-attendance" class="fold-body" style="display:none;">
                        <div class="divider" style="margin-top:0;"></div>
                        <div id="profile-attendance-list"></div>
                    </div>
                </div>
            </div>

            <!-- ADMIN ONLY: DELETE CARD -->
            <div class="card" id="danger-zone" style="display:none;">
                <h2 class="card-title" style="color:var(--red);">GEFAHRENZONE</h2>
                <div class="divider"></div>
                <p class="muted-text" style="margin-bottom:16px; font-size:0.85rem;">Das Löschen eines Spielers entfernt auch alle Spieldaten unwiderruflich.</p>
                <button id="delete-player-btn" class="btn btn-danger-outline">DELETE PLAYER PROFILE</button>
            </div>

        </div>

    <script>
        function toggleFold(id) {
            const body = document.getElementById(id);
            const icon = document.getElementById(id + '-icon');
            const isOpen = body.style.display !== 'none';
            body.style.display = isOpen ? 'none' : 'block';
            icon.textContent   = isOpen ? '▶' : '▼';
        }
    </script>
    <script src="database.js"></script>
    <script src="ui-manager-dashboard.js"></script>

    <script>
        // Auth guard + show danger zone for admins only
        (function() {
            var raw = sessionStorage.getItem('fc47_user');
            if (!raw) { window.location.href = 'index.html'; return; }
            var u = JSON.parse(raw);
            if (u.role === 'ipad') window.location.href = 'game.html';
            if (u.role === 'admin') document.getElementById('danger-zone').style.display = 'block';
        })();
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/fightclub-dart-tracker/sw.js')
                .catch(() => {}); // silently ignore errors on local dev
        }
    </script>
</body>
</html>
