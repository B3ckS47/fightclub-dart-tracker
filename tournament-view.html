<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlightClub · Turnier</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d0d0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="config.js"></script>
    <script src="ui-utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <nav id="nav-tournament-view">
        <div class="nav-inner nav-inner--default">
            <span class="nav-brand">FLIGHTCLUB</span>
            <div class="nav-links">
                <a href="tournaments.html" class="nav-btn">« Turniere</a>
            </div>
        </div>
    </nav>

    <div class="app-wrapper">

        <!-- Header info -->
        <div class="card" id="tourn-header-card">
            <div class="tourn-header-row">
                <h2 class="card-title" id="tourn-title">–</h2>
                <span id="tourn-status-badge" class="tourn-status"></span>
            </div>
            <div class="tourn-tags" id="tourn-setup-tags" style="margin-top:8px;"></div>
            <!-- Admin close button — injected by JS -->
            <div id="close-btn-wrap" style="display:none; margin-top:14px;">
                <button class="btn btn-danger btn-full" onclick="closeTournament()">TURNIER SCHLIESSEN</button>
            </div>
        </div>

        <!-- Bracket tree (small overview) -->
        <div class="card">
            <h2 class="card-title" id="bracket-title">TURNIERPLAN</h2>
            <div class="divider"></div>
            <div id="bracket-tree" class="bracket-tree"></div>
        </div>

        <!-- Current round matches (large, clickable) -->
        <div id="current-round-section" style="display:none;">
            <h2 class="section-title" id="current-round-title">AKTUELLE RUNDE</h2>
            <div id="current-round-matches"></div>
        </div>

        <!-- Swiss: loser bracket card -->
        <div id="loser-bracket-card" class="card" style="display:none; margin-top:24px;">
            <h2 class="card-title">VERLIERER-BRACKET</h2>
            <div class="divider"></div>
            <div id="loser-bracket-tree" class="bracket-tree"></div>
        </div>

        <!-- Swiss: pending loser bracket matches (large, clickable) -->
        <div id="loser-section" style="display:none;">
            <h2 class="section-title">VERLIERER-BRACKET · AKTUELLE RUNDE</h2>
            <div id="loser-round-matches"></div>
        </div>

    </div>

    <script>
        const supa = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_KEY);
        const raw  = sessionStorage.getItem('fc47_user');
        if (!raw) window.location.href = 'index.html';
        const user  = JSON.parse(raw);
        const params = new URLSearchParams(window.location.search);
        const tournId = params.get('id');
        if (!tournId) window.location.href = 'tournaments.html';

        let tournament = null;
        let participants = [];
        let matches = [];

        const MODE_LABEL  = { ko: 'K.O.', swiss: 'Swiss' };
        const TYPE_LABEL  = { singles: 'Einzel', doubles: 'Doppel' };
        const OUT_LABEL   = { single: 'Single Out', double: 'Double Out' };
        const LEGS_LABEL  = l => `First to ${l} ${l === 1 ? 'Leg' : 'Legs'}`;

        function partName(id) {
            if (!id) return 'BYE';
            const p = participants.find(p => p.id === id);
            return p ? p.name : '?';
        }

        function partNameShort(id) {
            const n = partName(id);
            return n.length > 14 ? n.slice(0, 13) + '…' : n;
        }

        async function load() {
            const { data: t } = await supa
                .from('tournaments')
                .select('*')
                .eq('id', tournId)
                .single();
            if (!t) { window.location.href = 'tournaments.html'; return; }
            tournament = t;

            const { data: parts } = await supa
                .from('tournament_participants')
                .select('*')
                .eq('tournament_id', tournId)
                .order('seed');
            participants = parts || [];

            const { data: mts } = await supa
                .from('tournament_matches')
                .select('*')
                .eq('tournament_id', tournId)
                .order('round')
                .order('match_number');
            matches = mts || [];

            // Auto-close if no open matches remain
            if (tournament.status === 'active') {
                const open = matches.filter(m => m.status === 'pending' && m.p1_id && m.p2_id);
                if (open.length === 0) {
                    const done = matches.filter(m => m.status === 'done');
                    if (done.length > 0) {
                        const finalMatch = done.find(m => m.bracket === 'final')
                            || done.reduce((a, b) => a.round > b.round ? a : b);
                        if (finalMatch?.winner_id && finalMatch?.loser_id) {
                            let thirdId = null;
                            const now = new Date().toISOString();
                            await supa.from('tournaments').update({
                                status:       'finished',
                                winner_id:    finalMatch.winner_id,
                                runner_up_id: finalMatch.loser_id,
                                third_id:     thirdId,
                                finished_at:  now
                            }).eq('id', tournId);
                            tournament.status       = 'finished';
                            tournament.winner_id    = finalMatch.winner_id;
                            tournament.runner_up_id = finalMatch.loser_id;
                            tournament.third_id     = thirdId;
                            tournament.finished_at  = now;
                        }
                    }
                }
            }

            render();
        }

        function render() {
            const t = tournament;
            document.getElementById('tourn-title').textContent = t.name;

            const badge = document.getElementById('tourn-status-badge');
            badge.textContent = t.status === 'active' ? '● AKTIV' : '✓ ABGESCHLOSSEN';
            badge.className   = `tourn-status ${t.status === 'active' ? 'tourn-status--active' : 'tourn-status--done'}`;

            // Show close button for admin on active tournaments
            if (user.role === 'admin' && t.status === 'active') {
                document.getElementById('close-btn-wrap').style.display = 'block';
            }

            document.getElementById('tourn-setup-tags').innerHTML = `
                <span class="tourn-tag">${MODE_LABEL[t.mode]}</span>
                <span class="tourn-tag">${TYPE_LABEL[t.game_type]}</span>
                <span class="tourn-tag">${t.start_score}</span>
                <span class="tourn-tag">${OUT_LABEL[t.checkout]}</span>
                <span class="tourn-tag">${LEGS_LABEL(t.legs)}</span>
            `;

            document.getElementById('bracket-title').textContent =
                t.mode === 'swiss' ? 'GEWINNER-BRACKET' : 'TURNIERPLAN';

            renderBracketTree();
            renderCurrentRound();
            if (t.mode === 'swiss') renderLoserBracket();
        }

        async function closeTournament() {
            const ok = await showConfirm('Turnier schließen', `„${tournament.name}" wirklich schließen?`);
            if (!ok) return;
            await supa.from('tournaments').update({
                status:      'finished',
                closed_by:   user.username,
                finished_at: new Date().toISOString()
            }).eq('id', tournId);
            window.location.href = 'tournaments.html';
        }

        function renderBracketTree() {
            const winnerMatches = matches.filter(m => m.bracket === 'winners' || m.bracket === 'final');
            const rounds = [...new Set(winnerMatches.map(m => m.round))].sort((a,b) => a - b);
            const maxRound = Math.max(...rounds);

            const el = document.getElementById('bracket-tree');
            el.innerHTML = '';

            rounds.forEach(r => {
                const col = document.createElement('div');
                col.className = 'bracket-col';

                const label = document.createElement('div');
                label.className = 'bracket-round-label';
                label.textContent = r === maxRound ? 'FINALE' : `RUNDE ${r}`;
                col.appendChild(label);

                const rMatches = winnerMatches.filter(m => m.round === r);
                rMatches.forEach(m => {
                    const card = document.createElement('div');
                    card.className = `bracket-match ${m.status === 'done' ? 'bracket-match--done' : m.status === 'active' ? 'bracket-match--active' : ''}`;

                    const p1name = partNameShort(m.p1_id);
                    const p2name = m.p2_id ? partNameShort(m.p2_id) : 'BYE';
                    const p1won  = m.winner_id === m.p1_id;
                    const p2won  = m.winner_id === m.p2_id;

                    card.innerHTML = `
                        <div class="bracket-player ${p1won ? 'bracket-player--winner' : (m.status === 'done' ? 'bracket-player--loser' : '')}">${m.p1_id ? p1name : '–'}</div>
                        <div class="bracket-divider"></div>
                        <div class="bracket-player ${p2won ? 'bracket-player--winner' : (m.status === 'done' && m.p2_id ? 'bracket-player--loser' : '')}">${m.p2_id ? p2name : (m.p1_id ? 'BYE' : '–')}</div>
                    `;
                    col.appendChild(card);
                });

                el.appendChild(col);
            });
        }

        function renderCurrentRound() {
            // Find the lowest round with pending matches in winners bracket
            const pending = matches.filter(m => m.status === 'pending' && m.p1_id && m.p2_id && m.bracket !== 'losers');
            if (pending.length === 0) {
                document.getElementById('current-round-section').style.display = 'none';
                return;
            }

            const currentRound = Math.min(...pending.map(m => m.round));
            const currentMatches = pending.filter(m => m.round === currentRound);

            document.getElementById('current-round-section').style.display = 'block';
            document.getElementById('current-round-title').textContent =
                `RUNDE ${currentRound} · ${currentMatches.length} ${currentMatches.length === 1 ? 'MATCH' : 'MATCHES'}`;

            const el = document.getElementById('current-round-matches');
            el.innerHTML = currentMatches.map(m => {
                const url = buildGameUrl(m);
                const canStart = user.role !== 'ipad' || true; // all roles can start
                return `
                    <a href="${url}" class="tourn-match-card ${canStart ? '' : 'tourn-match-card--readonly'}">
                        <div class="tourn-match-players">
                            <span class="tourn-match-player">${partName(m.p1_id)}</span>
                            <span class="tourn-match-vs">VS</span>
                            <span class="tourn-match-player">${partName(m.p2_id)}</span>
                        </div>
                        <div class="tourn-match-action">🎯 Spiel starten »</div>
                    </a>
                `;
            }).join('');
        }

        function renderLoserBracket() {
            const loserMatches = matches.filter(m => m.bracket === 'losers');
            if (loserMatches.length === 0) {
                document.getElementById('loser-bracket-card').style.display = 'none';
                document.getElementById('loser-section').style.display = 'none';
                return;
            }

            // ── Bracket tree ──
            document.getElementById('loser-bracket-card').style.display = 'block';
            const rounds = [...new Set(loserMatches.map(m => m.round))].sort((a, b) => a - b);
            const maxRound = Math.max(...rounds);
            const treeEl = document.getElementById('loser-bracket-tree');
            treeEl.innerHTML = '';

            rounds.forEach(r => {
                const col = document.createElement('div');
                col.className = 'bracket-col';

                const label = document.createElement('div');
                label.className = 'bracket-round-label';
                label.textContent = r === maxRound && loserMatches.filter(m => m.round === r).length === 1
                    ? 'FINALE L.' : `RUNDE ${r}`;
                col.appendChild(label);

                loserMatches.filter(m => m.round === r).forEach(m => {
                    const card = document.createElement('div');
                    card.className = `bracket-match bracket-match--loser ${m.status === 'done' ? 'bracket-match--done' : ''}`;

                    const p1won = m.winner_id === m.p1_id;
                    const p2won = m.winner_id === m.p2_id;

                    card.innerHTML = `
                        <div class="bracket-player ${p1won ? 'bracket-player--winner' : (m.status === 'done' ? 'bracket-player--loser' : '')}">${m.p1_id ? partNameShort(m.p1_id) : '–'}</div>
                        <div class="bracket-divider"></div>
                        <div class="bracket-player ${p2won ? 'bracket-player--winner' : (m.status === 'done' && m.p2_id ? 'bracket-player--loser' : '')}">${m.p2_id ? partNameShort(m.p2_id) : '–'}</div>
                    `;
                    col.appendChild(card);
                });

                treeEl.appendChild(col);
            });

            // ── Pending match cards ──
            const pending = loserMatches.filter(m => m.status === 'pending' && m.p1_id && m.p2_id);
            const loserSection = document.getElementById('loser-section');
            if (pending.length === 0) {
                loserSection.style.display = 'none';
                return;
            }

            loserSection.style.display = 'block';
            document.getElementById('loser-round-matches').innerHTML = pending.map(m => {
                const url = buildGameUrl(m);
                return `
                    <a href="${url}" class="tourn-match-card tourn-match-card--loser">
                        <div class="tourn-match-players">
                            <span class="tourn-match-player">${partName(m.p1_id)}</span>
                            <span class="tourn-match-vs">VS</span>
                            <span class="tourn-match-player">${partName(m.p2_id)}</span>
                        </div>
                        <div class="tourn-match-action">🎯 Spiel starten »</div>
                    </a>
                `;
            }).join('');
        }

        function buildGameUrl(match) {
            const t   = tournament;
            const p1  = partName(match.p1_id);
            const p2  = partName(match.p2_id);
            const url = new URL('game.html', window.location.href);
            url.searchParams.set('tournament_match_id', match.id);
            url.searchParams.set('tournament_id', tournId);
            url.searchParams.set('tournament_p1_id', match.p1_id);
            url.searchParams.set('tournament_p2_id', match.p2_id);
            url.searchParams.set('start_score', t.start_score);
            url.searchParams.set('checkout', t.checkout);
            url.searchParams.set('legs', t.legs);
            url.searchParams.set('game_type', t.game_type);
            url.searchParams.set('p1', p1);
            url.searchParams.set('p2', p2);
            return url.toString();
        }

        load();
        // Refresh every 15s for live updates
        setInterval(load, 15000);
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/fightclub-dart-tracker/sw.js').catch(() => {});
        }
    </script>
</body>
</html>
