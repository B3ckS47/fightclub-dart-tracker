<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlightClub · Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d0d0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <nav id="nav-admin">
        <div class="nav-inner nav-inner--default">
            <span class="nav-brand">FLIGHTCLUB</span>
            <div class="nav-links">
                <a href="index.html" class="nav-btn">« Menü</a>
            </div>
        </div>
    </nav>

    <div class="app-wrapper">
        <div class="card">

            <h2 class="card-title">ADMIN</h2>
            <div class="divider"></div>

            <!-- Add User -->
            <div class="register-section">
                <h3 class="section-label">Neuen Benutzer hinzufügen</h3>
                <div class="admin-form">
                    <input type="text" id="new-username" placeholder="Username" class="input-field">
                    <input type="password" id="new-password" placeholder="Passwort" class="input-field">
                    <select id="new-role" class="select-field">
                        <option value="member">Member</option>
                        <option value="admin">Admin</option>
                    </select>
                    <button onclick="addUser()" class="btn btn-accent">HINZUFÜGEN</button>
                </div>
                <p id="admin-msg" class="admin-msg"></p>
            </div>

            <div class="divider"></div>

            <!-- User List -->
            <div>
                <h3 class="section-label">Alle Benutzer</h3>
                <div id="user-list">
                    <p class="muted-text">Lade Benutzer...</p>
                </div>
            </div>

            <div class="divider"></div>

            <!-- Fines Reasons -->
            <div>
                <h3 class="section-label">Strafengründe</h3>
                <div class="admin-form" style="margin-bottom:12px;">
                    <input type="text"   id="new-reason-name"   placeholder="Bezeichnung" class="input-field">
                    <input type="number" id="new-reason-amount" placeholder="Betrag (€)" min="0.01" step="0.01" class="input-field">
                    <button onclick="addReason()" class="btn btn-accent">HINZUFÜGEN</button>
                </div>
                <p id="reasons-msg" class="admin-msg"></p>
                <div id="reasons-list">
                    <p class="muted-text">Lade Gründe...</p>
                </div>
            </div>

        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://daejfzypbnwtucwftkzn.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_xajv6XFl28cNrdMSohDhjg_aDyMT3Bl';
        const supa = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const SESSION_KEY = "fc47_user";

        // Auth guard — admin only
        const raw = sessionStorage.getItem(SESSION_KEY);
        const currentUser = raw ? JSON.parse(raw) : null;
        if (!currentUser || currentUser.role !== 'admin') {
            window.location.href = 'index.html';
        }

        // ── LOAD USERS ──
        async function loadUsers() {
            const { data, error } = await supa
                .from('app_users')
                .select('*')
                .order('username');

            if (error || !data) {
                document.getElementById('user-list').innerHTML = '<p class="muted-text">Fehler beim Laden.</p>';
                return;
            }

            document.getElementById('user-list').innerHTML = data.map(u => `
<div class="admin-user-row">
    <div class="admin-user-info">
        <div class="admin-user-name">${u.username}</div>
        <div class="admin-user-role role-badge role-badge--${u.role}">${u.role.toUpperCase()}</div>
    </div>
    <div class="admin-user-actions">
        <select onchange="changeRole('${u.id}', this.value)" class="select-field select-role">
            <option value="member" ${u.role === 'member' ? 'selected' : ''}>Member</option>
            <option value="admin"  ${u.role === 'admin'  ? 'selected' : ''}>Admin</option>
        </select>
        ${u.id !== currentUser.id ? `<button onclick="deleteUser('${u.id}', '${u.username}')" class="btn btn-danger-outline btn-sm">Löschen</button>` : '<div class="admin-you-badge">DU</div>'}
    </div>
</div>`).join('');
        }

        // ── ADD USER ──
        async function addUser() {
            const username = document.getElementById('new-username').value.trim();
            const password = document.getElementById('new-password').value;
            const role     = document.getElementById('new-role').value;
            const msgEl    = document.getElementById('admin-msg');

            if (!username || !password) {
                msgEl.textContent = 'Bitte alle Felder ausfüllen.';
                msgEl.style.color = 'var(--red)';
                return;
            }

            const { error } = await supa.from('app_users').insert([{ username, password, role }]);

            if (error) {
                msgEl.textContent = error.message.includes('unique') ? 'Username bereits vergeben.' : error.message;
                msgEl.style.color = 'var(--red)';
            } else {
                msgEl.textContent = `${username} wurde hinzugefügt!`;
                msgEl.style.color = 'var(--green)';
                document.getElementById('new-username').value = '';
                document.getElementById('new-password').value = '';
                loadUsers();
            }
            setTimeout(() => msgEl.textContent = '', 3000);
        }

        // ── CHANGE ROLE ──
        async function changeRole(userId, newRole) {
            const { error } = await supa
                .from('app_users')
                .update({ role: newRole })
                .eq('id', userId);
            if (error) alert('Fehler: ' + error.message);
            else loadUsers();
        }

        // ── DELETE USER ──
        async function deleteUser(userId, username) {
            if (!confirm(`Benutzer "${username}" wirklich löschen?`)) return;
            const { error } = await supa.from('app_users').delete().eq('id', userId);
            if (error) alert('Fehler: ' + error.message);
            else loadUsers();
        }

        // Load on start
        loadUsers();
        loadReasons();

        // ── LOAD REASONS ──
        async function loadReasons() {
            const { data, error } = await supa
                .from('fines_reasons')
                .select('*')
                .order('sort_order')
                .order('created_at');

            const listEl = document.getElementById('reasons-list');
            if (error || !data) {
                listEl.innerHTML = '<p class="muted-text">Fehler beim Laden.</p>';
                return;
            }
            if (data.length === 0) {
                listEl.innerHTML = '<p class="muted-text">Noch keine Gründe vorhanden.</p>';
                return;
            }

            listEl.innerHTML = data.map(r => `
<div class="admin-user-row">
    <div class="admin-user-info" style="flex:1;">
        <div class="admin-user-name">${r.name}</div>
    </div>
    <div class="admin-user-actions">
        <input type="number" value="${r.amount}" min="0.01" step="0.01"
            class="input-field select-role"
            style="width:100px; text-align:right;"
            onchange="updateReasonAmount('${r.id}', this.value)">
        <span class="admin-user-name" style="color:var(--text-muted); font-size:0.9rem;">€</span>
        <button onclick="deleteReason('${r.id}', '${r.name.replace(/'/g, "\\'")}')" class="btn btn-danger-outline btn-sm">Löschen</button>
    </div>
</div>`).join('');
        }

        // ── ADD REASON ──
        async function addReason() {
            const name   = document.getElementById('new-reason-name').value.trim();
            const amount = parseFloat(document.getElementById('new-reason-amount').value);
            const msgEl  = document.getElementById('reasons-msg');

            const showMsg = (text, color) => {
                msgEl.textContent = text;
                msgEl.style.color = color;
                setTimeout(() => msgEl.textContent = '', 3000);
            };

            if (!name)              return showMsg('Bitte eine Bezeichnung eingeben.', 'var(--red)');
            if (!amount || amount <= 0) return showMsg('Bitte einen gültigen Betrag eingeben.', 'var(--red)');

            const { error } = await supa.from('fines_reasons').insert([{ name, amount }]);
            if (error) {
                showMsg('Fehler: ' + error.message, 'var(--red)');
            } else {
                document.getElementById('new-reason-name').value   = '';
                document.getElementById('new-reason-amount').value = '';
                showMsg('Grund hinzugefügt!', 'var(--green)');
                loadReasons();
            }
        }

        // ── UPDATE REASON AMOUNT ──
        async function updateReasonAmount(id, newAmount) {
            const amount = parseFloat(newAmount);
            if (!amount || amount <= 0) { loadReasons(); return; }
            const { error } = await supa
                .from('fines_reasons')
                .update({ amount })
                .eq('id', id);
            if (error) alert('Fehler: ' + error.message);
        }

        // ── DELETE REASON ──
        async function deleteReason(id, name) {
            if (!confirm(`Grund "${name}" wirklich löschen?`)) return;
            const { error } = await supa.from('fines_reasons').delete().eq('id', id);
            if (error) alert('Fehler: ' + error.message);
            else loadReasons();
        }
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/fightclub-dart-tracker/sw.js')
                .catch(() => {}); // silently ignore errors on local dev
        }
    </script>
</body>
</html>
